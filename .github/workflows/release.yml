name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  # Keep in sync with go.mod, mise.toml, and ci.yml.
  GO_VERSION: "1.26.4"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build per-platform binaries
        run: |
          ver="${GITHUB_REF_NAME}"
          # Clean slate so no stale artifact from a previous build can ship.
          rm -rf dist && mkdir -p dist
          # ubi resolves a release asset by matching the host target triple, so
          # ship one tarball per triple, each containing the matching binary.
          # The tag is stamped in via -ldflags so `worktree version` reports it.
          build() {
            triple="$1"; goos="$2"; goarch="$3"
            out="dist/${triple}"
            mkdir -p "$out"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -ldflags "-X main.version=${ver}" -o "$out/worktree" ./cmd/worktree
            tar -czf "dist/worktree-${ver}-${triple}.tar.gz" -C "$out" worktree
          }
          build x86_64-unknown-linux-gnu  linux  amd64
          build aarch64-unknown-linux-gnu linux  arm64
          build x86_64-apple-darwin       darwin amd64
          build aarch64-apple-darwin      darwin arm64

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/worktree-"${GITHUB_REF_NAME}"-*.tar.gz \
            --title "${GITHUB_REF_NAME}" \
            --notes "worktree ${GITHUB_REF_NAME}"
